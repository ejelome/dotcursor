name: Repository Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history: seal-render-git-state walks `git log` for the commit
          # that deleted tools/narrative/state.py; a shallow clone hides it.
          fetch-depth: 0
      - name: Run test suite
        run: bash tests/run.sh
